name: PR Security

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-javascript:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Semgrep
        run: |
          python -m pip install --upgrade pip semgrep
          semgrep scan --config auto --error

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Test / Type Check / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install JS dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
      - name: npm audit
        run: npm audit
      - name: ESLint
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            npx --no-install eslint . --max-warnings=0
          fi
      - name: Prettier
        run: npx --no-install prettier --check .
      - name: Type Check
        run: npm run typecheck
      - name: Build
        run: npm run build

  claude-security-review:
    name: Claude Security Reviewer
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - name: Require Claude API key
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          if [ -z "$CLAUDE_API_KEY" ]; then
            echo "::error::CLAUDE_API_KEY secret is required for Claude Security Reviewer."
            exit 1
          fi
      - uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          comment-pr: true
